<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0d1322" />
  <title>타워 러쉬</title>
  <meta name="description" content="타워 러쉬 바로 시작" />

  <meta property="og:title" content="타워 러쉬" />
  <meta property="og:description" content="여기서 바로 시작" />
  <meta property="og:type" content="website" />

  <style>
    :root{
      --bg:#0d1322;
      --bg2:#111b33;
      --card:rgba(255,255,255,.08);
      --stroke:rgba(255,255,255,.12);
      --text:rgba(255,255,255,.94);
      --muted:rgba(255,255,255,.72);

      --y:#f6b318;
      --y2:#ffd666;
      --b:#3aa7ff;
      --b2:#78d4ff;
      --ink:#0a0f19;

      --r:24px;
      --shadow:0 18px 60px rgba(0,0,0,.42);
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, "Noto Sans KR", "Apple SD Gothic Neo", Segoe UI, Roboto, Arial, sans-serif;
      color:var(--text);
      background:
        radial-gradient(900px 520px at 15% 10%, rgba(246,179,24,.20), transparent 58%),
        radial-gradient(900px 520px at 85% 16%, rgba(58,167,255,.18), transparent 55%),
        linear-gradient(180deg, var(--bg2), var(--bg));
      overflow-x:hidden;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background-image:
        linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px);
      background-size:32px 32px;
      mask-image: radial-gradient(circle at 50% 24%, rgba(0,0,0,.95), transparent 72%);
    }

    .wrap{
      min-height:100%;
      display:flex;
      justify-content:center;
      align-items:flex-start;
      padding:24px 14px;
    }

    .card{
      width:min(560px, 94vw);
      border:1px solid var(--stroke);
      background:linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.06));
      border-radius:var(--r);
      box-shadow:var(--shadow);
      overflow:hidden;
      position:relative;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .card::before{
      content:"";
      position:absolute;
      top:-75px;
      right:-80px;
      width:300px;
      height:210px;
      background:linear-gradient(90deg, rgba(246,179,24,.52), rgba(246,179,24,.08));
      transform:rotate(12deg);
      border-radius:28px;
      opacity:.9;
    }

    .card::after{
      content:"";
      position:absolute;
      top:8px;
      right:12px;
      width:150px;
      height:150px;
      background:
        radial-gradient(circle at 30% 30%, rgba(120,212,255,.38), transparent 60%),
        radial-gradient(circle at 70% 70%, rgba(246,179,24,.22), transparent 60%);
      opacity:.9;
      pointer-events:none;
    }

    .inner{
      position:relative;
      z-index:1;
      padding:20px 16px 18px;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:8px 12px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(0,0,0,.18);
      color:rgba(255,255,255,.88);
      font-size:12px;
      font-weight:900;
      letter-spacing:.2px;
      white-space:nowrap;
    }

    .dot{
      width:9px;
      height:9px;
      border-radius:999px;
      background:linear-gradient(90deg, var(--y), var(--b));
      box-shadow:0 0 0 6px rgba(58,167,255,.10);
    }

    .hero{
      margin-top:14px;
    }

    .title{
      margin:0 0 8px;
      font-size:31px;
      line-height:1.06;
      letter-spacing:-.6px;
      font-weight:1000;
    }

    .tr{
      display:inline-block;
      text-shadow:
        -2px -2px 0 var(--ink),
         2px -2px 0 var(--ink),
        -2px  2px 0 var(--ink),
         2px  2px 0 var(--ink),
         0px  4px 0 rgba(0,0,0,.32);
      padding:2px 0;
    }

    .tr.y{ color:var(--y); }
    .tr.b{ color:var(--b); }

    .sub{
      margin:0 0 16px;
      color:var(--muted);
      font-size:15px;
      line-height:1.5;
      font-weight:700;
    }

    .cta{
      display:flex;
      align-items:center;
      justify-content:center;
      width:100%;
      margin-top:6px;
      padding:18px 16px;
      border:0;
      border-radius:20px;
      text-decoration:none;
      color:#0b1018;
      font-size:19px;
      font-weight:1000;
      letter-spacing:.2px;
      background:linear-gradient(90deg, var(--y), var(--b));
      box-shadow:0 16px 38px rgba(246,179,24,.17), 0 16px 38px rgba(58,167,255,.15);
      transition:transform .12s ease, filter .12s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .cta:active{
      transform:translateY(1px) scale(.995);
      filter:brightness(.98);
    }

    .hint{
      margin-top:10px;
      color:rgba(255,255,255,.68);
      font-size:12px;
      line-height:1.4;
      text-align:center;
      font-weight:700;
    }

    .promo{
      margin-top:16px;
      border:1px solid rgba(255,255,255,.12);
      border-radius:18px;
      background:linear-gradient(180deg, rgba(246,179,24,.13), rgba(58,167,255,.10));
      padding:13px 12px 12px;
    }

    .promo-title{
      font-size:14px;
      font-weight:1000;
      letter-spacing:.1px;
      margin:0;
    }

    .promo-sub{
      margin:5px 0 0;
      color:rgba(255,255,255,.72);
      font-size:12px;
      line-height:1.45;
      font-weight:800;
    }

    .code-row{
      margin-top:12px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    .code-pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:11px 13px;
      border-radius:14px;
      background:rgba(0,0,0,.20);
      border:1px solid rgba(255,255,255,.14);
      font-size:15px;
      font-weight:1000;
      letter-spacing:.8px;
    }

    .copy-btn{
      border:0;
      cursor:pointer;
      padding:11px 13px;
      border-radius:14px;
      background:linear-gradient(90deg, var(--y), var(--b));
      color:#0b1018;
      font-size:13px;
      font-weight:1000;
      -webkit-tap-highlight-color: transparent;
      transition:transform .12s ease, filter .12s ease;
    }

    .copy-btn:active{
      transform:translateY(1px);
      filter:brightness(.98);
    }

    .toast{
      margin-top:8px;
      color:rgba(255,255,255,.68);
      font-size:12px;
      line-height:1.4;
      font-weight:800;
    }

    @media (max-width:380px){
      .title{font-size:28px}
      .cta{font-size:18px; padding:17px 14px}
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card" aria-label="Tower Rush landing">
      <div class="inner">

        <div class="pill">
          <span class="dot"></span>
          요즘 많이 하는 그 게임
        </div>

        <div class="hero">
          <h1 class="title">
            <span class="tr y">타워</span> <span class="tr b">러쉬</span><br>
            여기서 바로 시작
          </h1>
          <p class="sub">
            그냥 바로 하면 됨 👇<br>
            코드만 넣으면 끝.
          </p>
        </div>

        <a class="cta" id="playBtn" href="#" rel="noopener">
          ▶ 지금 바로 하기
        </a>

        <div class="hint">
          복잡한 거 없음. 바로 시작 가능
        </div>

        <div class="promo" aria-label="Promo code">
          <p class="promo-title">혜택 받으려면 코드만 입력</p>
          <p class="promo-sub">가입할 때 프로모션 코드 칸에 넣으면 됨</p>

          <div class="code-row">
            <div class="code-pill">🔒 CODE: <span id="promoCode">TOWER5</span></div>
            <button class="copy-btn" id="copyBtn" type="button">코드 복사</button>
          </div>

          <div class="toast" id="toast">복사 → 가입할 때 코드 칸에 붙여넣기</div>
        </div>

      </div>
    </section>
  </main>

  <script>
    const TARGET_URL = "https://ptgateway.com/v1/process/377?landing=/signup";

    function buildUrl(base) {
      try {
        const u = new URL(base);
        const qs = new URLSearchParams(window.location.search);
        for (const [k, v] of qs.entries()) {
          if (!u.searchParams.has(k)) u.searchParams.set(k, v);
        }
        return u.toString();
      } catch (e) {
        return base;
      }
    }

    document.getElementById("playBtn").href = buildUrl(TARGET_URL);

    const promo = document.getElementById("promoCode").textContent.trim();
    const copyBtn = document.getElementById("copyBtn");
    const toast = document.getElementById("toast");

    async function copyCode() {
      const doneText = "복사 완료. 가입할 때 코드 칸에 넣으면 됨";
      const baseText = "복사 → 가입할 때 코드 칸에 붙여넣기";

      try {
        await navigator.clipboard.writeText(promo);
        toast.textContent = doneText;
        setTimeout(() => toast.textContent = baseText, 2200);
      } catch (e) {
        const ta = document.createElement("textarea");
        ta.value = promo;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        document.body.removeChild(ta);
        toast.textContent = doneText;
        setTimeout(() => toast.textContent = baseText, 2200);
      }
    }

    copyBtn.addEventListener("click", copyCode);
    document.getElementById("playBtn").addEventListener("touchstart", () => {}, { passive:true });
  </script>
</body>
</html>
